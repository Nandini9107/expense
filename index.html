<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraFinance // Premium Financial Intelligence</title>
    <style>
        /* --- PREMIUM DESIGN SYSTEM --- */
        :root {
            --bg-main: #090a0f;
            --bg-card: #12141c;
            --bg-card-hover: #171a26;
            --border-color: #1e2235;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-emerald: #10b981;
            --accent-coral: #f43f5e;
            --accent-violet: #8b5cf6;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-stack);
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- DASHBOARD WRAPPER --- */
        .dashboard-container {
            width: 100%;
            max-width: 1100px;
            background: linear-gradient(145deg, #11131f, #0c0d14);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- HEADER --- */
        header {
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        /* --- BENTO GRID LAYOUT --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* --- CARD STYLES --- */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.75rem;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #2e3552;
            background-color: var(--bg-card-hover);
            transform: translateY(-2px);
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        /* --- CONTROLS FORM --- */
        .control-group {
            margin-bottom: 1.75rem;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .control-label span.value {
            font-weight: 700;
        }

        .income-val { color: var(--accent-emerald); }
        .expense-val { color: var(--accent-coral); }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: #23283d;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--text-primary);
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* --- METRICS DISPLAY --- */
        .metrics-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .big-number {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-top: 0.5rem;
        }

        /* --- PROGRESS BAR --- */
        .progress-container {
            background-color: #23283d;
            height: 8px;
            border-radius: 4px;
            margin-top: 1rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--accent-emerald);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s;
        }

        /* --- FORECAST TIMELINE --- */
        .timeline {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .metrics-display { grid-template-columns: 1fr; }
            .timeline { grid-column: span 1; flex-direction: column; }
        }

        .timeline-node {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid var(--accent-violet);
            padding: 0.75rem 1rem;
            border-radius: 0 12px 12px 0;
        }

        .timeline-time {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-violet);
            text-transform: uppercase;
        }

        .timeline-cash {
            font-size: 1.35rem;
            font-weight: 700;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <h1>AuraFinance</h1>
            <p>Predictive Financial Intelligence Engine</p>
        </header>

        <div class="dashboard-grid">
            <!-- Left Side: Controls -->
            <div class="card" style="display: flex; flex-direction: column; justify-content: center;">
                <div class="card-title">Adjust Parameters</div>
                
                <div class="control-group">
                    <div class="control-label">
                        <span>Monthly Income</span>
                        <span class="value income-val" id="incomeLabel">$5,000</span>
                    </div>
                    <input type="range" id="incomeInput" min="1000" max="15000" step="100" value="5000">
                </div>

                <div class="control-group">
                    <div class="control-label">
                        <span>Monthly Expenses</span>
                        <span class="value expense-val" id="expenseLabel">$3,200</span>
                    </div>
                    <input type="range" id="expenseInput" min="500" max="10000" step="100" value="3200">
                </div>
            </div>

            <!-- Right Side: Bento Intelligence Grid -->
            <div class="metrics-display">
                <!-- Box 1: Net Cash Flow -->
                <div class="card">
                    <div class="card-title">Net Monthly Cash Flow</div>
                    <div class="big-number" id="netFlow">$1,800</div>
                </div>

                <!-- Box 2: Savings Rate -->
                <div class="card">
                    <div class="card-title">Savings Rate</div>
                    <div class="big-number" id="savingsRate">36%</div>
                </div>

                <!-- Box 3: Budget Health Meter -->
                <div class="card" style="grid-column: span 2;" id="healthCard">
                    <div class="card-title">Budget Health & Threshold</div>
                    <div id="healthStatus" style="font-weight: 600; font-size: 1.1rem;">Optimal Spending Range</div>
                    <div class="progress-container">
                        <div class="progress-bar" id="healthBar"></div>
                    </div>
                </div>

                <!-- Box 4: Forecasting Timeline -->
                <div class="timeline">
                    <div class="timeline-node">
                        <div class="timeline-time">3 Month Forecast</div>
                        <div class="timeline-cash" id="forecast3">$5,400</div>
                    </div>
                    <div class="timeline-node">
                        <div class="timeline-time">6 Month Forecast</div>
                        <div class="timeline-cash" id="forecast6">$10,800</div>
                    </div>
                    <div class="timeline-node">
                        <div class="timeline-time">12 Month Forecast</div>
                        <div class="timeline-cash" id="forecast12">$21,600</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- --- CORE CALCULATION ENGINE --- -->
    <script>
        const incomeInput = document.getElementById('incomeInput');
        const expenseInput = document.getElementById('expenseInput');
        
        const incomeLabel = document.getElementById('incomeLabel');
        const expenseLabel = document.getElementById('expenseLabel');
        
        const netFlowDisplay = document.getElementById('netFlow');
        const savingsRateDisplay = document.getElementById('savingsRate');
        const healthStatus = document.getElementById('healthStatus');
        const healthBar = document.getElementById('healthBar');
        
        const forecast3 = document.getElementById('forecast3');
        const forecast6 = document.getElementById('forecast6');
        const forecast12 = document.getElementById('forecast12');

        function formatCurrency(num) {
            if (num < 0) {
                return '-$' + Math.abs(num).toLocaleString();
            }
            return '$' + num.toLocaleString();
        }

        function calculateDashboard() {
            const income = parseInt(incomeInput.value);
            const expense = parseInt(expenseInput.value);

            // Update range labels
            incomeLabel.textContent = formatCurrency(income);
            expenseLabel.textContent = formatCurrency(expense);

            // 1. Net Cash Flow Logic
            const netFlow = income - expense;
            netFlowDisplay.textContent = formatCurrency(netFlow);
            if (netFlow < 0) {
                netFlowDisplay.style.color = 'var(--accent-coral)';
            } else {
                netFlowDisplay.style.color = 'var(--accent-emerald)';
            }

            // 2. Savings Rate Logic
            const savingsRate = income > 0 ? Math.round((netFlow / income) * 100) : 0;
            savingsRateDisplay.textContent = (netFlow > 0 ? savingsRate : 0) + '%';

            // 3. Budget Health Calculation
            const expenseRatio = (expense / income) * 100;
            healthBar.style.width = Math.min(expenseRatio, 100) + '%';

            if (expenseRatio <= 50) {
                healthStatus.textContent = 'Excellent Financial Runway';
                healthBar.style.backgroundColor = 'var(--accent-emerald)';
            } else if (expenseRatio <= 75) {
                healthStatus.textContent = 'Moderate Expense Volume';
                healthBar.style.backgroundColor = '#f59e0b'; // Amber warning color
            } else {
                healthStatus.textContent = 'Critical Cash Flow Strain';
                healthBar.style.backgroundColor = 'var(--accent-coral)';
            }

            // 4. Predictive Projections Logic
            forecast3.textContent = formatCurrency(Math.max(0, netFlow * 3));
            forecast6.textContent = formatCurrency(Math.max(0, netFlow * 6));
            forecast12.textContent = formatCurrency(Math.max(0, netFlow * 12));
        }

        // Event listeners to make it fully reactive in real-time
        incomeInput.addEventListener('input', calculateDashboard);
        expenseInput.addEventListener('input', calculateDashboard);

        // Initial launch run
        calculateDashboard();
    </script>
</body>
</html>
